<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Netherlands</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --glass: rgba(0, 0, 0, 0.9); }
        body { 
            margin: 0; 
            background: #000;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            transition: background 0.5s ease;
        }
        nav { background: rgba(0,0,0,0.95); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--emerald); padding: 40px; border-radius: 15px; display: none; }
        .section-box.active { display: block; }
        .admin-card { background: #111; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid gold; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; }
        .ticket-card { background: rgba(151, 215, 46, 0.1); border: 1px dashed var(--emerald); padding: 20px; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body id="main-body">

    <nav>
        <div style="font-family: 'Cinzel'; font-size: 24px; letter-spacing: 3px;">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">The Show</a>
            <a onclick="showSection('yourvisit')">Your Visit</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a onclick="showSection('newsletter')">Newsletter</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin')">ADMIN</a>
            <button class="btn" style="width:auto; padding: 5px 15px;" onclick="handleLogin()">LOG IN</button>
        </div>
    </nav>

    <div class="container">
        <section id="theshow" class="section-box active">
            <h2>Select your Show</h2>
            <div id="show-list">Loading shows...</div>
        </section>

        <section id="yourvisit" class="section-box">
            <h2>Your Tickets</h2>
            <div id="my-tickets-container">You haven't booked any tickets yet.</div>
        </section>

        <section id="audities" class="section-box">
            <h2>Audition Panel</h2>
            <div id="audition-ui">
                <input type="text" id="aud-name" placeholder="Full Name">
                <input type="text" id="aud-discord" placeholder="Discord Name">
                <textarea id="aud-exp" placeholder="Experience"></textarea>
                <button class="btn" onclick="submitAudition()">Submit Audition</button>
            </div>
            <div id="status-ui" style="display:none; text-align:center;">
                <h3 id="status-text">Processing...</h3>
                <p id="status-reason" style="color: #ff4444;"></p>
                <button id="retry-btn" class="btn" style="display:none;" onclick="resetAudition()">I Understand & Retry</button>
            </div>
        </section>

        <section id="admin" class="section-box">
            <h2 style="color:gold;">Witch Master Controls</h2>
            
            <div class="admin-card">
                <h3>Change Website Background</h3>
                <input type="text" id="bg-url-input" placeholder="Paste image URL here">
                <button class="btn" onclick="updateBackground()">Update Background</button>
            </div>

            <h3>Manage Auditions</h3>
            <div id="admin-auditions"></div>
        </section>

        <section id="newsletter" class="section-box"><h2>Newsletter</h2><div id="news-feed"></div></section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userSession = localStorage.getItem('wicked_user');

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- BACKGROUND SYSTEM ---
        async function updateBackground() {
            const url = document.getElementById('bg-url-input').value;
            await db.collection('settings').doc('theme').set({ background: url });
            alert("Background updated!");
        }

        db.collection('settings').doc('theme').onSnapshot(doc => {
            if(doc.exists()) document.getElementById('main-body').style.backgroundImage = `url('${doc.data().background}')`;
        });

        // --- AUDITION SYSTEM ---
        async function submitAudition() {
            const name = document.getElementById('aud-name').value;
            const disc = document.getElementById('aud-discord').value;
            const exp = document.getElementById('aud-exp').value;
            
            const docRef = await db.collection('auditions').add({
                name, discord: disc, exp, status: 'pending', reason: '', timestamp: Date.now()
            });
            localStorage.setItem('my_audition_id', docRef.id);
            monitorStatus(docRef.id);
        }

        function monitorStatus(id) {
            db.collection('auditions').doc(id).onSnapshot(doc => {
                if(!doc.exists) {
                    document.getElementById('audition-ui').style.display = 'block';
                    document.getElementById('status-ui').style.display = 'none';
                    return;
                }
                const data = doc.data();
                document.getElementById('audition-ui').style.display = 'none';
                document.getElementById('status-ui').style.display = 'block';
                
                if(data.status === 'pending') {
                    document.getElementById('status-text').innerText = "Status: Please wait for results";
                    document.getElementById('retry-btn').style.display = 'none';
                } else if(data.status === 'rejected') {
                    document.getElementById('status-text').innerText = "Status: Rejected";
                    document.getElementById('status-reason').innerText = "Reason: " + data.reason;
                    document.getElementById('retry-btn').style.display = 'block';
                } else if(data.status === 'accepted') {
                    document.getElementById('status-text').innerText = "Status: ACCEPTED! Check your Discord.";
                    document.getElementById('status-text').style.color = "var(--emerald)";
                }
            });
        }

        async function resetAudition() {
            const id = localStorage.getItem('my_audition_id');
            await db.collection('auditions').doc(id).delete();
            localStorage.removeItem('my_audition_id');
            location.reload();
        }

        // --- ADMIN AUDITIONS ---
        async function loadAdminAuditions() {
            db.collection('auditions').where('status', '==', 'pending').onSnapshot(snap => {
                const list = document.getElementById('admin-auditions');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="admin-card">
                            <b>${d.name}</b> (${d.discord})
                            <p>${d.exp}</p>
                            <input type="text" id="rej-${doc.id}" placeholder="Reason if rejecting">
                            <button class="btn" style="width:48%; background:green;" onclick="updateAudStatus('${doc.id}', 'accepted')">Accept</button>
                            <button class="btn" style="width:48%; background:red;" onclick="updateAudStatus('${doc.id}', 'rejected')">Reject</button>
                        </div>`;
                });
            });
        }

        async function updateAudStatus(id, stat) {
            const reason = document.getElementById('rej-'+id).value;
            await db.collection('auditions').doc(id).update({ status: stat, reason: reason });
        }

        // --- LOGIN ---
        function handleLogin() {
            const user = prompt("Username:");
            if(user === "virtual2025") {
                localStorage.setItem('wicked_user', 'admin');
                location.reload();
            }
        }
        if(userSession === 'admin') {
            document.getElementById('admin-nav').style.display = 'block';
            loadAdminAuditions();
        }
        if(localStorage.getItem('my_audition_id')) monitorStatus(localStorage.getItem('my_audition_id'));

    </script>
</body>
</html>
