<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Roblox Musical - Management</title>
    <style>
        :root {
            --wicked-green: #97d72e;
            --dark-bg: #111;
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000;
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Navigatie */
        nav {
            background-color: #000;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            gap: 30px;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: bold;
            border-bottom: 1px solid #222;
        }

        nav a { color: var(--wicked-green); text-decoration: none; cursor: pointer; }

        /* Dynamische Banner */
        .header-banner {
            height: 350px;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background 0.5s ease;
            box-shadow: inset 0 0 100px #000;
        }

        .logo { font-size: 4rem; font-family: serif; letter-spacing: 8px; text-shadow: 2px 2px 10px #000; }

        /* Container */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            padding: 0 20px;
        }

        .sidebar-card {
            background-color: var(--card-bg);
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        .btn {
            background-color: var(--wicked-green);
            color: #000;
            padding: 12px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            margin-top: 15px;
            border: none;
            cursor: pointer;
        }

        /* Kalender */
        .calendar-container { background-color: var(--card-bg); border: 1px solid #333; }
        .calendar-header { padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-label { padding: 10px; font-size: 0.7rem; background: #222; border: 0.5px solid #333; text-align: center; }
        .calendar-day { min-height: 100px; border: 0.5px solid #333; padding: 5px; position: relative; }
        .date-num { display: block; text-align: right; color: #555; margin-bottom: 5px; }
        .show-tag { 
            background: rgba(151, 215, 46, 0.2); 
            color: var(--wicked-green); 
            font-size: 0.75rem; 
            padding: 2px 5px; 
            margin-bottom: 2px;
            border-radius: 3px;
            text-align: center;
        }

        /* Admin Paneel Overlay */
        #admin-panel {
            display: none;
            position: fixed;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            width: 400px;
            background: #222;
            padding: 30px;
            border: 2px solid var(--wicked-green);
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
        }

        .close-btn { color: red; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <nav>
        <a onclick="location.reload()">TICKETS</a>
        <a onclick="alert('Binnenkort beschikbaar!')">DE SHOW</a>
        <a onclick="showLogin()">BEHEER PANEEL</a>
    </nav>

    <div class="header-banner" id="mainBanner" style="background-image: url('https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Header_Green_Texture.jpg');">
        <div class="logo">WICKED</div>
        <h2 id="bannerTitle">ROBLOX MUSICAL EDITION</h2>
    </div>

    <div class="container">
        <aside>
            <div class="sidebar-card">
                <h3 style="color: var(--wicked-green)">FRONT ROW</h3>
                <p>Zit op de eerste rij in de Roblox studio!</p>
                <button class="btn" onclick="alert('Ticketsysteem opent binnenkort')">KOOP TICKETS</button>
            </div>
            <div class="sidebar-card">
                <h3 style="color: var(--wicked-green)">CAST</h3>
                <p id="castDisplay">Nog geen cast ingesteld.</p>
            </div>
        </aside>

        <main class="calendar-container">
            <div class="calendar-header">MAART 2026</div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </main>
    </div>

    <div id="admin-panel">
        <span class="close-btn" onclick="closeAdmin()">X</span>
        <h3>Beheerpaneel</h3>
        
        <label>Achtergrond Foto URL:</label>
        <input type="text" id="bgInput" placeholder="https://afbeelding-url.jpg">
        
        <label>Show Toevoegen (Dag nummer):</label>
        <input type="number" id="dayInput" min="1" max="31">
        
        <label>Tijd:</label>
        <input type="text" id="timeInput" placeholder="Bijv. 19:30">

        <label>Cast Lijst:</label>
        <input type="text" id="castInput" placeholder="Naam1, Naam2...">

        <button class="btn" onclick="saveSettings()">OPSLAAN & BIJWERKEN</button>
    </div>

    <script>
        const correctPassword = "Virtual2025!";
        let shows = JSON.parse(localStorage.getItem('wicked_shows')) || [];
        let customBg = localStorage.getItem('wicked_bg') || 'https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Header_Green_Texture.jpg';
        let customCast = localStorage.getItem('wicked_cast') || 'Nog geen cast ingesteld.';

        function init() {
            document.getElementById('mainBanner').style.backgroundImage = `url('${customBg}')`;
            document.getElementById('castDisplay').innerText = customCast;
            renderCalendar();
        }

        function showLogin() {
            let pass = prompt("Voer het wachtwoord in voor beheer:");
            if (pass === correctPassword) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('bgInput').value = customBg;
                document.getElementById('castInput').value = customCast;
            } else {
                alert("Fout wachtwoord!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        function saveSettings() {
            const newBg = document.getElementById('bgInput').value;
            const day = document.getElementById('dayInput').value;
            const time = document.getElementById('timeInput').value;
            const cast = document.getElementById('castInput').value;

            if(newBg) localStorage.setItem('wicked_bg', newBg);
            if(cast) localStorage.setItem('wicked_cast', cast);
            
            if(day && time) {
                shows.push({day: parseInt(day), time: time});
                localStorage.setItem('wicked_shows', JSON.stringify(shows));
            }

            alert("Instellingen opgeslagen!");
            location.reload();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const labels = ['MA', 'DI', 'WO', 'DO', 'VR', 'ZA', 'ZO'];
            
            grid.innerHTML = '';
            labels.forEach(l => grid.innerHTML += `<div class="day-label">${l}</div>`);

            // Maart 2026 begint op een zondag (dag 7 in ons grid)
            for(let i=1; i<7; i++) grid.innerHTML += `<div class="calendar-day"></div>`;

            for(let d=1; d<=31; d++) {
                let showHtml = '';
                const dayShows = shows.filter(s => s.day === d);
                dayShows.forEach(s => {
                    showHtml += `<div class="show-tag">${s.time}</div>`;
                });

                grid.innerHTML += `
                    <div class="calendar-day">
                        <span class="date-num">${d}</span>
                        ${showHtml}
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
