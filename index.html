<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Wicked | Official Booking System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --wicked-green: #97d72e; --dark-bg: #111; --border: #333; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; }
        
        /* Navbar exact zoals screenshot */
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        nav a { color: var(--wicked-green); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
        .logo { display: block; margin: 0 auto 10px; height: 50px; }

        /* Banner */
        .banner { height: 300px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Header_Green_Texture.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .banner h1 { font-size: 2.5rem; letter-spacing: 5px; }

        .container { max-width: 1100px; margin: 30px auto; display: grid; grid-template-columns: 280px 1fr; gap: 20px; padding: 0 20px; }
        
        /* Sidebar Cards */
        .sidebar-card { background: #1a1a1a; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); text-align: center; }
        .sidebar-card h3 { color: var(--wicked-green); font-size: 14px; margin-top: 0; }
        .sidebar-card p { font-size: 11px; color: #ccc; }
        .btn-side { background: var(--wicked-green); color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Kalender */
        .calendar-header { background: #222; padding: 10px; text-align: center; font-weight: bold; border: 1px solid var(--border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); }
        .day { min-height: 100px; border: 0.5px solid var(--border); padding: 5px; background: #111; cursor: pointer; position: relative; }
        .day:hover { background: #222; }
        .day-num { font-size: 12px; color: #666; display: block; text-align: right; }
        .show-time { background: rgba(151, 215, 46, 0.2); color: var(--wicked-green); font-size: 10px; padding: 3px; border-radius: 2px; text-align: center; margin-top: 5px; font-weight: bold; display: block; }

        /* Seating Chart (Gebaseerd op je ronde screenshot) */
        .seating-container { display: none; background: #111; padding: 30px; border: 2px solid var(--wicked-green); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .podium { width: 150px; background: #fff; color: #000; text-align: center; margin: 0 auto 30px; padding: 5px; font-weight: bold; }
        .seats-row { display: flex; justify-content: center; margin-bottom: 5px; gap: 4px; }
        .seat { width: 18px; height: 18px; border-radius: 50%; background: #ffd700; cursor: pointer; border: 1px solid #000; }
        .seat.taken { background: #444; cursor: not-allowed; }
        .seat.blocked { background: #ff4444; cursor: not-allowed; }
        .seat.blue { background: #0000ff; }
        .seat.red { background: #ff0000; }

        /* Admin / Auth */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border: 2px solid var(--wicked-green); z-index: 1100; width: 400px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid var(--border); color: #fff; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav>
    <img src="https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Logo_White.png" class="logo">
    <div style="display:flex; justify-content: center;">
        <a onclick="location.reload()">TICKETS</a>
        <a id="admin-btn" style="display:none; color:gold;" onclick="openAdmin()">ADMIN & SUPPORT</a>
        <a id="auth-btn" onclick="openAuth()">INLOGGEN</a>
    </div>
</nav>

<div class="banner">
    <h1>BOOK WITH US<br><span style="font-size: 1.2rem;">FOR OFFICIAL WICKED ROBLOX TICKETS</span></h1>
</div>

<div class="container">
    <aside>
        <div class="sidebar-card">
            <h3>FRONT ROW TICKETS</h3>
            <p>Beleef Wicked van heel dichtbij op de voorste rij!</p>
            <button class="btn-side" onclick="alert('Selecteer een show in de kalender')">RESERVEER</button>
        </div>
        <div class="sidebar-card">
            <h3>MIJN ACCOUNT</h3>
            <div id="user-tickets" style="font-size: 10px; color: var(--wicked-green);">Log in om je tickets te zien.</div>
        </div>
    </aside>

    <main>
        <div class="calendar-header">MARCH 2026</div>
        <div class="calendar-grid" id="calendar"></div>
    </main>
</div>

<div class="seating-container" id="seating-modal">
    <div class="podium">PODIUM</div>
    <div id="seating-chart"></div>
    <button class="btn-side" style="background:#444; color:#fff;" onclick="closeAll()">SLUITEN</button>
</div>

<div class="modal" id="admin-modal">
    <h3>Admin Dashboard</h3>
    <label>Dag van show (1-31):</label>
    <input type="number" id="adm-day">
    <label>Tijd (bijv. 7.30 PM):</label>
    <input type="text" id="adm-time">
    <label>Cast voor deze dag:</label>
    <textarea id="adm-cast"></textarea>
    <button class="btn-side" onclick="saveShow()">SHOW OPSLAAN</button>
    <hr>
    <label>Support: Handmatig ticket aan email:</label>
    <input type="email" id="sup-email" placeholder="Email gebruiker">
    <input type="number" id="sup-seat" placeholder="Stoelnummer">
    <button class="btn-side" style="background:gold;" onclick="supportTicket()">TICKET TOEVOEGEN</button>
</div>

<div class="modal" id="auth-modal">
    <h3>Inloggen</h3>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Wachtwoord">
    <button class="btn-side" onclick="handleAuth()">BEVESTIG</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6NE5hOdVdRc1JJuxe5jbyT7LLaXJi84o",
        authDomain: "wickeddemusical.firebaseapp.com",
        projectId: "wickeddemusical",
        storageBucket: "wickeddemusical.firebasestorage.app",
        messagingSenderId: "81908034436",
        appId: "1:81908034436:web:1d56709ad83e7492e4cbd1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "jouwemail@gmail.com"; // VERANDER DIT
    let activeShowId = null;

    // Start
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-btn').innerText = "UITLOGGEN";
            document.getElementById('auth-btn').onclick = () => auth.signOut().then(()=>location.reload());
            if(user.email === ADMIN_EMAIL) document.getElementById('admin-btn').style.display = 'inline';
            loadUserTickets(user.uid);
        }
        renderCalendar();
    });

    async function renderCalendar() {
        const snap = await db.collection('shows').get();
        const shows = {};
        snap.forEach(doc => shows[doc.data().day] = {id: doc.id, ...doc.data()});
        
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        for(let i=1; i<=31; i++) {
            let html = `<div class="day" onclick="${shows[i] ? `openSeating('${shows[i].id}')` : ''}">
                <span class="day-num">${i}</span>`;
            if(shows[i]) html += `<span class="show-time">${shows[i].time}</span>`;
            cal.innerHTML += html + `</div>`;
        }
    }

    async function openSeating(showId) {
        activeShowId = showId;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('seating-modal').style.display = 'block';
        
        const doc = await db.collection('shows').doc(showId).get();
        const taken = doc.data().takenSeats || [];
        const chart = document.getElementById('seating-chart');
        chart.innerHTML = '';

        // Maak ronde rijen zoals in je screenshot
        const rows = [8, 10, 12, 14, 16]; 
        let seatCounter = 1;

        rows.forEach(count => {
            let rowHtml = '<div class="seats-row">';
            for(let i=0; i<count; i++) {
                const isTaken = taken.includes(seatCounter);
                rowHtml += `<div class="seat ${isTaken ? 'taken' : ''}" 
                            onclick="bookSeat(${seatCounter}, ${isTaken})" 
                            title="Stoel ${seatCounter}"></div>`;
                seatCounter++;
            }
            chart.innerHTML += rowHtml + '</div>';
        });
    }

    async function bookSeat(num, taken) {
        if(taken) return alert("Stoel al bezet!");
        const user = auth.currentUser;
        if(!user) return openAuth();

        await db.collection('shows').doc(activeShowId).update({
            takenSeats: firebase.firestore.FieldValue.arrayUnion(num)
        });
        
        await db.collection('users').doc(user.uid).collection('tickets').add({
            seat: num,
            showId: activeShowId,
            timestamp: new Date()
        });

        alert("Stoel " + num + " gereserveerd!");
        location.reload();
    }

    // Admin
    function openAdmin() { document.getElementById('overlay').style.display='block'; document.getElementById('admin-modal').style.display='block'; }
    
    async function saveShow() {
        const day = parseInt(document.getElementById('adm-day').value);
        const time = document.getElementById('adm-time').value;
        const cast = document.getElementById('adm-cast').value;
        
        await db.collection('shows').add({ day, time, cast, takenSeats: [] });
        alert("Show toegevoegd!");
        location.reload();
    }

    // Auth Helpers
    function openAuth() { document.getElementById('overlay').style.display='block'; document.getElementById('auth-modal').style.display='block'; }
    async function handleAuth() {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); }
        catch { 
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection('users').doc(res.user.uid).set({email: e});
        }
        location.reload();
    }

    function closeAll() { document.querySelectorAll('.modal, .seating-container, .overlay').forEach(el => el.style.display='none'); }

    async function loadUserTickets(uid) {
        const snap = await db.collection('users').doc(uid).collection('tickets').get();
        const div = document.getElementById('user-tickets');
        if(!snap.empty) {
            div.innerHTML = '';
            snap.forEach(doc => div.innerHTML += `<div>🎟️ Stoel ${doc.data().seat}</div>`);
        }
    }
</script>
</body>
</html>
