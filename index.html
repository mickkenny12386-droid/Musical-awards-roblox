<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulin Rouge! | The Spectacular Musical</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rouge: #4a0404; --bright-red: #bc0000; --gold: #d4af37; --gold-light: #f9e29b; --black: #050505; 
        }

        body { 
            background: radial-gradient(circle at center, var(--rouge) 0%, var(--black) 100%); 
            color: white; font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; transition: opacity 0.5s; overflow-x: hidden;
        }

        /* Navigatie met nieuwe omtrek */
        nav { 
            display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .logo { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.8rem; letter-spacing: 3px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        section { padding: 60px 10%; display: none; }
        .active { display: block; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glow-title { font-family: 'Cinzel Decorative'; color: var(--gold-light); text-shadow: 0 0 15px var(--bright-red); text-align: center; font-size: 3.5rem; }

        /* Agenda Grid */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 30px; }
        .day { background: rgba(0,0,0,0.6); border: 1px solid #333; min-height: 100px; padding: 10px; cursor: pointer; text-align: center; transition: 0.3s; }
        .day:hover { border-color: var(--gold); }
        .has-show { border: 2px solid var(--bright-red); background: rgba(188,0,0,0.15); box-shadow: inset 0 0 15px rgba(188,0,0,0.2); }

        /* Ticket Overlay */
        #ticket-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .window { background: var(--rouge); border: 3px solid var(--gold); padding: 30px; border-radius: 15px; width: 90%; max-width: 550px; text-align: center; box-shadow: 0 0 50px #000; }
        .tier { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 15px; margin: 10px 0; border: 1px solid var(--gold); }

        /* Dashboard */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .admin-box { background: rgba(15,15,15,0.9); border: 1px solid var(--gold); padding: 25px; border-radius: 10px; }
        .btn { background: var(--bright-red); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-del { background: none; color: #ff4444; border: 1px solid #ff4444; padding: 5px; cursor: pointer; font-size: 0.7rem; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MOULIN ROUGE!</div>
    <div class="nav-links">
        <a onclick="showPage('home')" id="n-home">Home</a>
        <a onclick="showPage('casting')" id="n-cast">Auditie</a>
        <a onclick="showPage('tickets')" id="n-tickets">Tickets</a>
        <a onclick="showPage('wallet')" id="n-wallet">Mijn Tickets (<span id="t-count">0</span>)</a>
        <a onclick="adminLogin()" id="n-club">Club</a>
        <div onclick="toggleLang()" id="lang-btn" style="color:var(--gold); font-weight:bold; cursor:pointer; border:1px solid var(--gold); padding:5px 10px;">NL</div>
    </div>
</nav>

<section id="home" class="active">
    <h1 class="glow-title" id="h-welcome">WELKOM</h1>
    <div id="home-posts" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;"></div>
</section>

<section id="casting">
    <h1 class="glow-title" id="h-cast">AUDITIE</h1>
    <div class="admin-box" style="max-width:500px; margin:0 auto;">
        <input type="text" id="c-disc" placeholder="Discord Name">
        <input type="text" id="c-rob" placeholder="Roblox Name">
        <select id="c-role"><option>Christian</option><option>Satine</option><option>Zidler</option></select>
        <textarea id="c-exp" placeholder="Ervaring?"></textarea>
        <button class="btn" onclick="submitAudition()" id="btn-apply">SOLLICITEER</button>
    </div>
</section>

<section id="tickets">
    <h1 class="glow-title" id="h-tickets">APRIL 2026</h1>
    <div class="calendar" id="calendar-grid"></div>
</section>

<section id="wallet">
    <h1 class="glow-title" id="h-wallet">MIJN TICKETS</h1>
    <div id="wallet-content" style="max-width:500px; margin:0 auto;"></div>
</section>

<div id="ticket-overlay">
    <div class="window">
        <h2 id="sel-date" style="font-family:'Cinzel Decorative'; color:var(--gold);">DATE</h2>
        <div id="tier-options"></div>
        <button class="btn" style="background:#333;" onclick="closeTickets()">CANCEL</button>
    </div>
</div>

<section id="dashboard">
    <h1 class="glow-title">DASHBOARD</h1>
    <div class="admin-grid">
        <div class="admin-box">
            <h3>Nieuwe Show / Post</h3>
            <input type="number" id="d-day" placeholder="Dag (1-30)">
            <button class="btn" onclick="addShow()">SHOW TOEVOEGEN</button>
            <hr>
            <input type="text" id="p-title" placeholder="Titel Bericht">
            <textarea id="p-desc" placeholder="Inhoud..."></textarea>
            <button class="btn" style="background:var(--gold); color:black;" onclick="addPost()">POSTEN</button>
        </div>
        <div class="admin-box">
            <h3>Beheer</h3>
            <div id="admin-shows"></div>
            <hr>
            <div id="admin-auditions"></div>
        </div>
    </div>
</section>

<script>
    let shows = {}; let posts = []; let auditions = []; let myTickets = []; let lang = 'NL'; let isAdmin = false;
    const CAP = { cancan: 24, rang1: 76, diamond: 260, bohemian: 96 };

    const texts = {
        NL: { home: "HOME", cast: "AUDITIE", tickets: "TICKETS", wallet: "MIJN TICKETS", welcome: "WELKOM", apply: "SOLLICITEER" },
        EN: { home: "HOME", cast: "CASTING", tickets: "TICKETS", wallet: "MY TICKETS", welcome: "WELCOME", apply: "APPLY" },
        DE: { home: "START", cast: "BESETZUNG", tickets: "KARTEN", wallet: "MEINE KARTEN", welcome: "WILLKOMMEN", apply: "BEWERBEN" }
    };

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function adminLogin() {
        if(prompt("Wachtwoord:") === "Virtual2025!") { isAdmin = true; showPage('dashboard'); renderAdmin(); }
    }

    // SHOW & TICKET LOGICA
    function addShow() {
        const d = document.getElementById('d-day').value;
        if(!d) return;
        shows[d] = { sold: { cancan:0, rang1:0, diamond:0, bohemian:0 } };
        renderCalendar(); renderAdmin();
    }

    function deleteShow(d) {
        delete shows[d];
        renderCalendar(); renderAdmin();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            const hasShow = shows[i];
            grid.innerHTML += `<div class="day ${hasShow?'has-show':''}" onclick="openTickets(${i})">
                <strong>${i}</strong>${hasShow?'<br><small>SHOW</small>':''}
            </div>`;
        }
    }

    function openTickets(d) {
        if(!shows[d]) return;
        document.getElementById('sel-date').innerText = `APRIL ${d}, 2026`;
        let html = '';
        const tiers = [
            {id:'cancan', name:'Can-Can', price:10, multi:false},
            {id:'rang1', name:'Rang 1', price:0, multi:true},
            {id:'diamond', name:'Diamond', price:0, multi:true},
            {id:'bohemian', name:'Bohemian', price:0, multi:true}
        ];
        
        tiers.forEach(t => {
            const left = CAP[t.id] - shows[d].sold[t.id];
            html += `<div class="tier">
                <div style="text-align:left;"><b>${t.name}</b><br><small>${left} left</small></div>
                <div>
                    ${left > 0 ? (t.multi ? `<select id="q-${t.id}"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>` : '1x') : ''}
                    <button class="btn" style="width:auto; padding:5px;" onclick="buy(${d}, '${t.id}')" ${left<=0?'disabled':''}>${left>0?'BUY':'FULL'}</button>
                </div>
            </div>`;
        });
        document.getElementById('tier-options').innerHTML = html;
        document.getElementById('ticket-overlay').style.display = 'flex';
    }

    function buy(d, tier) {
        const qty = document.getElementById(`q-${tier}`) ? parseInt(document.getElementById(`q-${tier}`).value) : 1;
        if(myTickets.length + qty > 5) return alert("Max 5 tickets!");
        
        for(let i=0; i<qty; i++) {
            shows[d].sold[tier]++;
            myTickets.push({ d, tier, id: Math.random().toString(36).substr(2,6).toUpperCase() });
        }
        document.getElementById('t-count').innerText = myTickets.length;
        renderWallet(); confetti({ particleCount:150, spread:70, origin:{y:0.6} });
        closeTickets();
    }

    function renderWallet() {
        document.getElementById('wallet-content').innerHTML = myTickets.map(t => `
            <div style="background:white; color:black; padding:15px; margin:10px 0; border-left:10px solid var(--bright-red); font-family:monospace;">
                <b>MOULIN ROUGE!</b><br>DATE: APRIL ${t.d}<br>TIER: ${t.tier.toUpperCase()}<br>CODE: ${t.id}
            </div>
        `).join('');
    }

    function closeTickets() { document.getElementById('ticket-overlay').style.display = 'none'; }

    // POSTS & ADMIN
    function addPost() {
        posts.push({ id:Date.now(), title: document.getElementById('p-title').value, desc: document.getElementById('p-desc').value });
        renderHome(); renderAdmin();
    }

    function deletePost(id) { posts = posts.filter(p => p.id !== id); renderHome(); renderAdmin(); }

    function renderHome() {
        document.getElementById('home-posts').innerHTML = posts.map(p => `
            <div class="admin-box">
                <h3>${p.title}</h3><p>${p.desc}</p>
                ${isAdmin ? `<button class="btn-del" onclick="deletePost(${p.id})">VERWIJDEREN</button>` : ''}
            </div>
        `).join('');
    }

    function submitAudition() {
        auditions.push({ id:Date.now(), rob: document.getElementById('c-rob').value, exp: document.getElementById('c-exp').value });
        alert("Verzonden!"); renderAdmin();
    }

    function renderAdmin() {
        if(!isAdmin) return;
        document.getElementById('admin-shows').innerHTML = "<h4>Shows</h4>" + Object.keys(shows).map(d => `<div>Dag ${d} <button class="btn-del" onclick="deleteShow(${d})">X</button></div>`).join('');
        document.getElementById('admin-auditions').innerHTML = "<h4>Audities</h4>" + auditions.map(a => `<div>${a.rob} <button class="btn-del" onclick="auditions = auditions.filter(x=>x.id!==${a.id}); renderAdmin();">X</button></div>`).join('');
    }

    // TAAL
    function toggleLang() {
        const l = ['NL','EN','DE']; lang = l[(l.indexOf(lang)+1)%3];
        document.getElementById('lang-btn').innerText = lang;
        confetti({ particleCount:100, colors:['#bc0000','#d4af37'] });
        document.body.style.opacity = 0;
        setTimeout(() => {
            const t = texts[lang];
            document.getElementById('n-home').innerText = t.home;
            document.getElementById('n-cast').innerText = t.cast;
            document.getElementById('n-tickets').innerText = t.tickets;
            document.getElementById('n-wallet').innerText = `${t.wallet} (${myTickets.length})`;
            document.getElementById('h-welcome').innerText = t.welcome;
            document.getElementById('h-cast').innerText = t.cast;
            document.getElementById('btn-apply').innerText = t.apply;
            document.body.style.opacity = 1;
        }, 500);
    }

    renderCalendar();
</script>
</body>
</html>
